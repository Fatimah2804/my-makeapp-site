<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز موعد | קביעת תור</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff;
            margin: 0;
            padding: 40px 20px;
            text-align: center;
            font-family: 'Lora', serif;
        }

        .form-box {
            max-width: 500px;
            margin: 0 auto;
            background: #fff9fb;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            font-family: 'Lora', serif;
        }

        h1 {
            color: #c1a592;
            margin-bottom: 20px;
            font-family: 'Lora', serif;
        }

        .selected-slot {
            background: white;
            border: 1px solid #efe5e8;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 20px;
            font-size: 18px;
            color: #333;
        }

        form p {
            text-align: right;
            margin-bottom: 15px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-top: 5px;
            box-sizing: border-box;
            font-family: 'Lora', serif;
        }

        button {
            background: #efe5e8;
            color: black;
            font-family: 'Lora', serif;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="form-box">
        <h1>حجز موعد  |book now</h1>
        <div style="margin-bottom: 20px;">
    <a href="/appointments/schedule/" style="
        display:inline-block;
        padding:10px 18px;
        background:#efe5e8;
        color:black;
        text-decoration:none;
        border-radius:8px;
        font-weight:bold;
    ">
        العودة للجدول | Back to Schedule
    </a>
</div>

        <div class="selected-slot">
            <strong>التاريخ والساعة المختارة </strong><br>
            {{ date_value }} | {{ time_value }}
        </div>

        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="date" value="{{ date_value|date:'Y-m-d' }}">
            <input type="hidden" name="time" value="{{ time_value }}">

            {{ form.as_p }}

            <button type="submit">احجزي الآن | Book now</button>
        </form>
        {% if error %}
        <div style="background:#ffe6e6; color:#b30000; padding:10px; border-radius:8px; margin-bottom:15px;">
            {{ error }}
        </div>
    {% endif %}
    </div>
</body>
</html>
